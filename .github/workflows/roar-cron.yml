name: Roar Arena live sync

on:
  schedule:
    - cron: '3,13,23,33,43,53 * * * *'
    - cron: '7,22,37,52 * * * *'
    - cron: '17 */2 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync-live-data:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Call Roar Arena cron endpoint
        env:
          ROAR_BASE_URL: ${{ secrets.ROAR_BASE_URL }}
          ROAR_CRON_URL: ${{ secrets.ROAR_CRON_URL }}
          ROAR_CRON_SECRET: ${{ secrets.ROAR_CRON_SECRET }}
        run: |
          set -euo pipefail

          ROAR_CRON_URL="${ROAR_CRON_URL:-https://roararenaindia.vercel.app/api/cron/roar}"
          ROAR_BASE_URL="${ROAR_BASE_URL:-${ROAR_CRON_URL%/api/cron/roar}}"
          ROAR_BASE_URL="${ROAR_BASE_URL%/}"
          SCHEDULE="${{ github.event.schedule || 'manual' }}"

          if [ -z "${ROAR_CRON_URL}" ]; then
            echo "::error::Missing GitHub secret ROAR_CRON_URL"
            exit 1
          fi

          if [ -z "${ROAR_CRON_SECRET}" ]; then
            echo "::error::Missing GitHub secret ROAR_CRON_SECRET"
            exit 1
          fi

          call_endpoint() {
            path="$1"
            url="${ROAR_BASE_URL}${path}"
            response="$(curl --fail --silent --show-error --retry 2 --retry-delay 5 --max-time 60 \
              --header "Authorization: Bearer ${ROAR_CRON_SECRET}" \
              "${url}")"

            node - "$response" "$path" <<'NODE'
          const payload = JSON.parse(process.argv[2])
          const path = process.argv[3]

          if (!payload.ok) {
            console.error(JSON.stringify(payload, null, 2))
            process.exit(1)
          }

          const summary = {
            path,
            ok: payload.ok,
            mode: payload.mode,
            checkedAt: payload.checkedAt,
            fetched: payload.fetched,
            upserted: payload.upserted,
            resultValidation: payload.resultValidation,
            homepageValidation: payload.homepageValidation,
            results: payload.results,
          }

          console.log(JSON.stringify(summary, null, 2))
          NODE
          }

          case "${SCHEDULE}" in
            "3,13,23,33,43,53 * * * *")
              call_endpoint "/api/sync/instagram"
              call_endpoint "/api/admin/auto-curate"
              ;;
            "7,22,37,52 * * * *")
              call_endpoint "/api/sync/matches"
              call_endpoint "/api/sync/tennis"
              call_endpoint "/api/admin/auto-curate"
              ;;
            "17 */2 * * *")
              call_endpoint "/api/cron/roar"
              ;;
            *)
              call_endpoint "/api/cron/roar"
              ;;
          esac
